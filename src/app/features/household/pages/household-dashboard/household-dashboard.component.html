<section class="household-dashboard">
  <h1>Household Inventory</h1>

  @if (errorMessage()) {
    <div class="error-message" role="alert">
      {{ errorMessage() }}
      <button (click)="clearError()" class="close-error" aria-label="Close error">&times;</button>
    </div>
  }

  <div class="search-section">
    <label>
      Search items:
      <input
        type="text"
        [value]="search()"
        (input)="setSearch($event)"
        placeholder="Search by name..."
      />
    </label>
  </div>

  <div class="forms-section">
    <div class="flex-vert--full-size">

      <div class="household">
        <h3>Add Item</h3>
        
        <app-household-form
        (addItem)="addItem($event)"
        (error)="showError($event)"
        ></app-household-form>
      </div>
      
      <div class="table">
        <h3>Inventory</h3>
        
        <app-household-table [items]="filteredItems()" [maxDataCount]="maxDataCount()"></app-household-table>
      </div>
    </div>
      
    <div class="furniture">
      <h3>Add Furniture</h3>

      <app-furniture-form
        (addFurniture)="addFurniture($event)"
        (error)="showError($event)"
      ></app-furniture-form>
    </div>
  </div>
</section>
