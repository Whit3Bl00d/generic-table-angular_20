<section class="household-dashboard">
  <h1>Household Inventory</h1>

    <section class="filters">
      <filter
        title="Search"
        placeholder="Search by name..."
        [debounce]="300"
        [control]="filters.controls.name"
        (inputChange)="name.set($event)">
      </filter>
      
      <filter
        title="Type"
        placeholder="Filter by type..."
        [debounce]="300"
        [control]="filters.controls.type"
        (inputChange)="type.set($event)">
      </filter>
      
      <filter
        title="Quantity"
        placeholder="Filter by quantity..."
        [debounce]="300"
        [control]="filters.controls.quantity"
        (inputChange)="quantity.set($event)">
      </filter>
    </section>

  <div class="forms-section">
    <div class="flex-vert--full-size">

      <div class="household">
        <h3>Add Item</h3>
        
        <app-household-form></app-household-form>
      </div>
      
      <div class="table">
        <h3>Inventory</h3>
        
        <app-household-table [filters]="filterParams()"></app-household-table>
      </div>
    </div>
      
    <div class="furniture">
      <h3>Add Furniture</h3>

      <app-furniture-form></app-furniture-form>
    </div>
  </div>
</section>
