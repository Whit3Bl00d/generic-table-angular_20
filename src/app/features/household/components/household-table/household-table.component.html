<app-generic-table
  [columns]="columns()"
  [data]="items()"
  [emptyTemplate]="emptyTemplate"
  [showRowNumbers]="true"
  [showSortShowcase]="true"
  [rowNumberLabel]="'#'"
  [selectionModel]="selectionModel()"
  [maxDataCount]="maxDataCount()"
  (rowClick)="onRowClick($event)"
  (scrollEnd)="onScrollEnd()"
  (sortChange)="onSortChange($event)"
>
  <ng-template #emptyTemplate>
    <div class="custom-empty-state">
      <h3>📦 No items in your inventory</h3>

      <p>Start by adding some furniture or general items to your household inventory.</p>
    </div>
  </ng-template>

  <ng-template [tableCell]="customTemplate.columnType.type === ColumnTypes.CUSTOM ? customTemplate.columnType.templateName : ''" let-item let-col="column">
    <button>
      Click me {{ item.name }}
    </button>
  </ng-template>

</app-generic-table>
