<form (submit)="onSubmit($event)" class="furniture-form">
  <div class="form-group">
    <label for="furniture">Furniture Type:</label>
    <select name="furniture" id="furniture" required>
      <option value="">Choose furniture...</option>
      @for (type of furnitureTypes; track type) {
        <option [value]="type">{{ type }}</option>
      }
    </select>
  </div>
  
  <div class="form-group">
    <label for="count">Count:</label>
    <input 
      name="count" 
      id="count" 
      type="number" 
      [min]="1" 
      [max]="99" 
      value="1" 
      required 
    />
  </div>
  
  <button type="submit" class="add-furniture-btn">Add Furniture</button>
</form>
