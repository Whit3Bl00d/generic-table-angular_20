<form [formGroup]="form" (ngSubmit)="onSubmit()" class="furniture-form">
  <div class="form-group">
    <label for="furniture">Furniture Type:</label>
    <select formControlName="furniture" id="furniture" required>
      <option value="">Choose furniture...</option>
      @for (type of furnitureTypes; track type) {
        <option [value]="type">{{ type }}</option>
      }
    </select>
  </div>
  
  <div class="form-group">
    <label for="count">Count:</label>
    <input 
      formControlName="count"
      id="count" 
      type="number" 
    />
  </div>
  
  <button type="submit" [disabled]="!form.valid">Add Furniture</button>
</form>
